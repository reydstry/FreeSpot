services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: freespot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=freespot_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freespot-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freespot-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./backend/src:/app/src
      - yolo_models:/root/.cache/ultralytics
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/freespot_db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    networks:
      - freespot-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  freespot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  yolo_models:
    driver: local
